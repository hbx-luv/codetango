<div>
  <ion-grid class="grid-container" [class.greyscale]="shouldGreyscale">
    <div class="tile-container" *ngFor="let tile of tiles">
      <ion-button
        [class.spymaster]="spymaster"
        [class.selected]="tile.selected"
        [class.readonly]="readonly"
        [class.pictures]="game.hasPictures"
        [class.emojis]="game.hasEmojis"
        [class.meme-picture]="game.gameType == GameType.MEMES"
        [color]="getColor(tile)"
        class="word {{ spymaster || game.completedAt ? tile.role : '' }}"
        (click)="selectTile(tile)"
      >
        <ng-container [ngSwitch]="type">
          <span *ngSwitchCase="GameType.WORDS">{{ tile.word }}</span>
          <span class="legacy-emojis" *ngSwitchCase="GameType.LEGACY_EMOJIS">
            {{ tile.word }}
          </span>
          <span *ngSwitchDefault>
            <ion-img [src]="getPictureSrc(tile.word)"></ion-img>
          </span>
        </ng-container>
      </ion-button>

      <img class="dart" src="../../../assets/{{ tile.dartedBy === 'BLUE' ? 'blue' : 'red' }}-dart.png" *ngIf="tile.dartedBy">

      <!-- candidate toggle: lets a player pin themselves to the tile so
           teammates can see what they're considering. Click is captured here
           so it never reveals the tile. -->
      <button
        type="button"
        class="candidate-toggle"
        [class.active]="isCandidate(tile)"
        (click)="toggleCandidate($event, tile)"
        *ngIf="canMarkCandidate(tile)"
        [attr.aria-label]="isCandidate(tile) ? 'Unmark candidate' : 'Mark as candidate'"
        [tooltip]="isCandidate(tile) ? 'Unmark candidate' : 'Mark as candidate'"
      >
        <ion-icon [name]="isCandidate(tile) ? 'star' : 'star-outline'"></ion-icon>
      </button>

      <!-- avatars of teammates currently considering this tile, pinned 50%
           inside / 50% hanging off the bottom edge -->
      <div class="candidates" *ngIf="!tile.selected && tile.candidates?.length">
        <ion-avatar
          class="candidate-avatar"
          *ngFor="let userId of tile.candidates"
          [tooltip]="candidateUsers[userId]?.nickname || candidateUsers[userId]?.name"
        >
          <ion-img [src]="candidateUsers[userId]?.photoURL"></ion-img>
        </ion-avatar>
      </div>
    </div>
  </ion-grid>
  <ion-row class="advice-row" *ngIf="!isObserver">
    <h4>{{advice}}</h4>
  </ion-row>
</div>
