<div>
  <ion-grid
    class="grid-container"
    [class.greyscale]="shouldGreyscale"
    [class.april-fools]="aprilFoolsBoard">
    <div class="tile-container" *ngFor="let slot of displaySlots">
      <ion-button
        [class.spymaster]="spymaster"
        [class.selected]="slot.tile.selected"
        [class.readonly]="readonly"
        [class.pictures]="game.hasPictures"
        [class.emojis]="game.hasEmojis"
        [class.meme-picture]="game.gameType == GameType.MEMES"
        [color]="getColor(slot.tile)"
        class="word {{ spymaster || game.completedAt ? slot.tile.role : '' }}"
        (click)="selectTile(slot.tile)"
      >
        <span
          class="af-tile-fill"
          [class.af-corner-tl]="slot.mutation === 'tl'"
          [class.af-corner-tr]="slot.mutation === 'tr'"
          [class.af-corner-bl]="slot.mutation === 'bl'"
          [class.af-corner-br]="slot.mutation === 'br'"
        >
          <span
            class="af-flip-layer"
            [class.af-flip-v]="slot.mutation === 'flipV'"
            [class.af-flip-h]="slot.mutation === 'flipH'"
            [class.af-rotate]="slot.mutation === 'rotate'"
            [style.transform]="aprilFoolsRotateTransform(slot)"
            [appRandomBlink]="slot.mutation === 'blink'"
          >
            <ng-container [ngSwitch]="type">
              <span *ngSwitchCase="GameType.WORDS">{{ slot.tile.word }}</span>
              <span class="legacy-emojis" *ngSwitchCase="GameType.LEGACY_EMOJIS">
                {{ slot.tile.word }}
              </span>
              <span *ngSwitchDefault>
                <ion-img [src]="getPictureSrc(slot.tile.word)"></ion-img>
              </span>
            </ng-container>
          </span>
        </span>
      </ion-button>

      <img class="dart" src="../../../assets/{{ slot.tile.dartedBy === 'BLUE' ? 'blue' : 'red' }}-dart.png" *ngIf="slot.tile.dartedBy">
    </div>
  </ion-grid>
  <ion-row class="advice-row" *ngIf="!isObserver">
    <h4>{{advice}}</h4>
  </ion-row>
</div>
